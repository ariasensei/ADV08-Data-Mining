const weeks = {
  1: {
    title: 'Clustering Techniques',
    ilo: ['Apply K-Means clustering to datasets.', 'Interpret clustering results.'],
    content: `
      <h3>What is Clustering?</h3>
      <p>Clustering is an <strong>unsupervised learning</strong> technique that groups similar data points together without predefined labels. Think of it as sorting a pile of mixed candies by color — you don't need someone to tell you the categories; you discover them naturally.</p>
      <svg width="280" height="180" viewBox="0 0 280 180" style="margin:1rem 0;max-width:100%;">
        <circle cx="50" cy="60" r="8" fill="#ef4444" class="anim-float" opacity="0.8"/>
        <circle cx="70" cy="40" r="8" fill="#ef4444" class="anim-float-d1" opacity="0.8"/>
        <circle cx="40" cy="80" r="8" fill="#ef4444" class="anim-float-d2" opacity="0.8"/>
        <circle cx="65" cy="75" r="8" fill="#ef4444" class="anim-float" opacity="0.8"/>
        <circle cx="200" cy="50" r="8" fill="#3b82f6" class="anim-float-d2" opacity="0.8"/>
        <circle cx="220" cy="70" r="8" fill="#3b82f6" class="anim-float" opacity="0.8"/>
        <circle cx="230" cy="45" r="8" fill="#3b82f6" class="anim-float-d1" opacity="0.8"/>
        <circle cx="210" cy="35" r="8" fill="#3b82f6" class="anim-float-d2" opacity="0.8"/>
        <circle cx="140" cy="130" r="8" fill="#22c55e" class="anim-float-d1" opacity="0.8"/>
        <circle cx="120" cy="150" r="8" fill="#22c55e" class="anim-float" opacity="0.8"/>
        <circle cx="155" cy="145" r="8" fill="#22c55e" class="anim-float-d2" opacity="0.8"/>
        <circle cx="55" cy="62" r="30" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
        <circle cx="215" cy="50" r="30" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
        <circle cx="138" cy="142" r="28" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
      </svg>

      <h3>K-Means Clustering</h3>
      <p><strong>K-Means</strong> is the most popular clustering algorithm. It partitions data into <em>K</em> clusters by repeatedly assigning points to the nearest center (centroid) and updating centroids.</p>
      <div class="metric-box metric-1">
        <p style="font-weight:bold;margin-bottom:0.5rem;">Algorithm Steps:</p>
        <ol style="margin:0;padding-left:1.5rem;">
          <li>Choose K (number of clusters)</li>
          <li>Randomly initialize K centroids</li>
          <li>Assign each point to nearest centroid</li>
          <li>Recalculate centroids as mean of assigned points</li>
          <li>Repeat steps 3–4 until centroids stabilize</li>
        </ol>
      </div>

      <div style="margin:1.5rem 0;padding:1rem;border-radius:0.5rem;background:rgba(99,102,241,0.08);">
        <p style="font-weight:bold;margin-bottom:0.75rem;">🎯 Interactive K-Means Demo</p>
        <button onclick="runKMeansDemo()" style="background:var(--c-primary);color:#fff;margin-right:0.5rem;">▶ Run K-Means</button>
        <button onclick="resetKMeansDemo()" style="background:var(--c-secondary-action);color:#fff;">↺ Reset</button>
        <svg id="kmeans-svg" width="100%" viewBox="0 0 300 200" style="background:rgba(255,255,255,0.03);border-radius:0.375rem;margin-top:1rem;height:200px;"></svg>
        <p id="kmeans-status" style="font-size:0.75rem;text-align:center;margin-top:0.5rem;opacity:0.6;">Click "Run K-Means" to see the algorithm in action</p>
      </div>

      <h3>Real-World Scenario: Customer Segmentation</h3>
      <p>🏬 A retail company uses K-Means with K=3 to segment customers by annual spending and purchase frequency:</p>
      <ul>
        <li><strong style="color:#ef4444;">High-Value:</strong> Frequent buyers, high spending → VIP rewards</li>
        <li><strong style="color:#3b82f6;">Regular:</strong> Moderate frequency & spending → Loyalty programs</li>
        <li><strong style="color:#22c55e;">Occasional:</strong> Rare visits, low spending → Re-engagement offers</li>
      </ul>

      <h3>Hierarchical Clustering (Overview)</h3>
      <p>Unlike K-Means, <strong>hierarchical clustering</strong> builds a tree-like structure (dendrogram) showing how clusters merge or split at different levels. You don't need to specify K in advance.</p>
    `,
    activity: `
      <h3>📝 Individual Activity: Cluster the Students</h3>
      <p>Given this dataset, manually perform K-Means clustering with K=2 for one iteration:</p>
      <table>
        <thead>
          <tr><th>Student</th><th>Study Hours</th><th>Exam Score</th></tr>
        </thead>
        <tbody>
          <tr><td>A</td><td>2</td><td>55</td></tr>
          <tr><td>B</td><td>3</td><td>60</td></tr>
          <tr><td>C</td><td>8</td><td>90</td></tr>
          <tr><td>D</td><td>9</td><td>85</td></tr>
          <tr><td>E</td><td>5</td><td>72</td></tr>
        </tbody>
      </table>
      <p><strong>Task:</strong> Using initial centroids at Student A (2,55) and Student C (8,90), assign each student to the nearest cluster and calculate new centroids. Show your work.</p>

      <h3>👥 Group Activity: Segment Real Customers</h3>
      <p>In groups of 3–4, create a mock dataset of at least 15 customers with attributes like age, income, and spending score. Apply K-Means with K=2 and K=3, compare results, and present your findings in 3 minutes.</p>
    `,
    quiz: [
      { q: 'What type of learning is clustering?', opts: ['Supervised', 'Unsupervised', 'Reinforcement', 'Semi-supervised'], ans: 1 },
      { q: 'In K-Means, what does K represent?', opts: ['Number of features', 'Number of iterations', 'Number of clusters', 'Number of data points'], ans: 2 },
      { q: 'After assigning points to clusters, the next step is:', opts: ['Stop the algorithm', 'Recalculate centroids', 'Add more data', 'Remove outliers'], ans: 1 }
    ]
  },
  2: {
    title: 'Association Rule Mining',
    ilo: ['Explain association rule mining concepts.', 'Interpret support, confidence, and lift measures.', 'Apply association rule mining to datasets.'],
    content: `
      <h3>What is Association Rule Mining?</h3>
      <p>Association rule mining discovers interesting <strong>relationships between variables</strong> in large datasets. The classic example: "Customers who buy bread often also buy butter."</p>

      <h3>Key Measures: Support, Confidence, Lift</h3>
      <div class="metric-box metric-1">
        <p style="font-weight:bold;">📊 Support</p>
        <p>How frequently an itemset appears in the dataset.</p>
        <p style="font-family:monospace;color:var(--c-primary);">Support(A) = (Transactions containing A) / (Total transactions)</p>
      </div>
      <div class="metric-box metric-2">
        <p style="font-weight:bold;">🎯 Confidence</p>
        <p>How often the rule is true — if A is bought, what's the probability B is also bought?</p>
        <p style="font-family:monospace;color:#3b82f6;">Confidence(A→B) = Support(A∪B) / Support(A)</p>
      </div>
      <div class="metric-box metric-3">
        <p style="font-weight:bold;">🚀 Lift</p>
        <p>How much more likely A and B are bought together vs. independently.</p>
        <p style="font-family:monospace;color:#22c55e;">Lift(A→B) = Confidence(A→B) / Support(B)</p>
        <p style="font-size:0.875rem;opacity:0.7;">Lift > 1 = positive association, Lift = 1 = independent, Lift < 1 = negative</p>
      </div>

      <h3>Real-World Scenario: Grocery Store Analysis</h3>
      <p>🛒 A supermarket analyzed 1,000 transactions:</p>
      <ul>
        <li>400 transactions contain Bread</li>
        <li>300 transactions contain Butter</li>
        <li>200 transactions contain both</li>
      </ul>
      <p><strong>Support</strong> = 200/1000 = <strong>0.20 (20%)</strong></p>
      <p><strong>Confidence</strong> = 200/400 = <strong>0.50 (50%)</strong></p>
      <p><strong>Lift</strong> = 0.50/0.30 = <strong>1.67</strong> → Positive association!</p>

      <div style="margin:1.5rem 0;padding:1rem;border-radius:0.5rem;background:rgba(99,102,241,0.08);">
        <p style="font-weight:bold;margin-bottom:0.75rem;">📊 Try It: Calculate Metrics</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:1rem;">
          <label><span style="font-size:0.75rem;opacity:0.6;">Total Transactions</span><input type="number" id="mc-total" value="1000" style="width:100%;padding:0.5rem;border-radius:0.375rem;border:1px solid rgba(255,255,255,0.1);background:var(--c-surface);color:var(--c-text);font-family:'DM Sans',sans-serif;margin-top:0.25rem;"></label>
          <label><span style="font-size:0.75rem;opacity:0.6;">Contain A</span><input type="number" id="mc-a" value="400" style="width:100%;padding:0.5rem;border-radius:0.375rem;border:1px solid rgba(255,255,255,0.1);background:var(--c-surface);color:var(--c-text);font-family:'DM Sans',sans-serif;margin-top:0.25rem;"></label>
          <label><span style="font-size:0.75rem;opacity:0.6;">Contain B</span><input type="number" id="mc-b" value="300" style="width:100%;padding:0.5rem;border-radius:0.375rem;border:1px solid rgba(255,255,255,0.1);background:var(--c-surface);color:var(--c-text);font-family:'DM Sans',sans-serif;margin-top:0.25rem;"></label>
          <label><span style="font-size:0.75rem;opacity:0.6;">Contain A & B</span><input type="number" id="mc-ab" value="200" style="width:100%;padding:0.5rem;border-radius:0.375rem;border:1px solid rgba(255,255,255,0.1);background:var(--c-surface);color:var(--c-text);font-family:'DM Sans',sans-serif;margin-top:0.25rem;"></label>
        </div>
        <button onclick="calcMetrics()" style="background:var(--c-primary);color:#fff;width:100%;">Calculate</button>
        <div id="mc-results" style="margin-top:1rem;font-size:0.875rem;"></div>
      </div>
    `,
    activity: `
      <h3>📝 Individual Activity: Calculate Metrics</h3>
      <p>An online bookstore has 500 transactions:</p>
      <ul>
        <li>200 contain "Fiction Novels"</li>
        <li>150 contain "Bookmarks"</li>
        <li>100 contain both</li>
      </ul>
      <p><strong>Tasks:</strong></p>
      <ol>
        <li>Calculate Support for {Fiction Novels, Bookmarks}</li>
        <li>Calculate Confidence for Fiction Novels → Bookmarks</li>
        <li>Calculate Lift. Is this a positive association?</li>
        <li>What business recommendation would you give?</li>
      </ol>

      <h3>👥 Group Activity: Market Basket Investigation</h3>
      <p>Create a mock transaction dataset of 20 transactions with 5+ item types, identify the top 3 most frequent item pairs, calculate Support/Confidence/Lift for each, and present your findings with marketing recommendations.</p>
    `,
    quiz: [
      { q: 'Association rule mining is commonly used in:', opts: ['Image recognition', 'Market basket analysis', 'Speech synthesis', 'Video editing'], ans: 1 },
      { q: 'If Lift = 1.0, the items are:', opts: ['Positively associated', 'Negatively associated', 'Independent', 'Always bought together'], ans: 2 },
      { q: 'Confidence(A→B) measures:', opts: ['How often A appears', 'How often B appears given A', 'Total transactions', 'Number of items'], ans: 1 }
    ]
  },
  3: {
    title: 'Data Mining for Business Decision Making',
    ilo: ['Interpret data mining models and patterns.', 'Translate analytical results into business insights.', 'Support data-driven decision making.'],
    content: `
      <h3>From Patterns to Decisions</h3>
      <p>Data mining produces models and patterns, but their real value lies in <strong>translating them into actionable business insights</strong>.</p>

      <h3>Interpreting Patterns & Models</h3>
      <p>Key questions when interpreting results:</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:1rem 0;">
        <div style="padding:0.75rem;border-radius:0.375rem;background:rgba(99,102,241,0.08);">
          <p style="font-weight:bold;font-size:0.875rem;">🔍 Validity</p>
          <p style="font-size:0.75rem;">Is the pattern statistically significant or just noise?</p>
        </div>
        <div style="padding:0.75rem;border-radius:0.375rem;background:rgba(59,130,246,0.08);">
          <p style="font-weight:bold;font-size:0.875rem;">📏 Magnitude</p>
          <p style="font-size:0.75rem;">How large is the effect? Is it practically important?</p>
        </div>
        <div style="padding:0.75rem;border-radius:0.375rem;background:rgba(34,197,94,0.08);">
          <p style="font-weight:bold;font-size:0.875rem;">🎯 Actionability</p>
          <p style="font-size:0.75rem;">Can we do something about it?</p>
        </div>
        <div style="padding:0.75rem;border-radius:0.375rem;background:rgba(234,179,8,0.08);">
          <p style="font-weight:bold;font-size:0.875rem;">⚠️ Context</p>
          <p style="font-size:0.75rem;">Does domain knowledge support this finding?</p>
        </div>
      </div>

      <h3>Real-World Scenario: Reducing Churn</h3>
      <p>📱 A telecom company's model reveals:</p>
      <ul>
        <li>Customers with month-to-month contracts are 3x more likely to churn</li>
        <li>Customers who called support > 4 times have 72% churn rate</li>
        <li>High data users with slow plans churn within 3 months</li>
      </ul>
      <p><strong>Business Actions:</strong></p>
      <ul>
        <li>Offer annual plan discounts to month-to-month users</li>
        <li>Proactive outreach after 3rd support call</li>
        <li>Automatic plan upgrade suggestions for data-heavy users</li>
      </ul>

      <h3>Ethical Issues & Data Privacy</h3>
      <p>Data-driven decisions must consider ethical implications:</p>
      <div style="margin:1rem 0;">
        <div style="display:flex;gap:1rem;margin-bottom:0.75rem;">
          <span style="font-size:1.5rem;">⚖️</span>
          <div><p style="font-weight:bold;font-size:0.875rem;margin:0;">Fairness</p><p style="font-size:0.75rem;margin:0;">Do models treat all demographic groups equitably?</p></div>
        </div>
        <div style="display:flex;gap:1rem;margin-bottom:0.75rem;">
          <span style="font-size:1.5rem;">🔒</span>
          <div><p style="font-weight:bold;font-size:0.875rem;margin:0;">Privacy</p><p style="font-size:0.75rem;margin:0;">Is personal data collected and used responsibly?</p></div>
        </div>
        <div style="display:flex;gap:1rem;">
          <span style="font-size:1.5rem;">✅</span>
          <div><p style="font-weight:bold;font-size:0.875rem;margin:0;">Consent</p><p style="font-size:0.75rem;margin:0;">Did users agree to how their data is used?</p></div>
        </div>
      </div>
    `,
    activity: `
      <h3>📝 Individual Activity: Interpret & Recommend</h3>
      <p>A streaming service reveals:</p>
      <ol>
        <li>Users with <2 hrs/week watch time have 60% cancellation rate</li>
        <li>Users who add to "My List" but never watch have 45% churn</li>
        <li>Users who share accounts watch 3x more content</li>
      </ol>
      <p>For each pattern, assess actionability, propose strategy, and identify ethical concerns.</p>

      <h3>👥 Group Activity: Business Case Study</h3>
      <p>Choose an industry, define a business problem, describe your data mining approach, present 3 "discovered" patterns, translate to recommendations, and include ethical considerations.</p>
    `,
    quiz: [
      { q: 'The primary goal of interpreting results is:', opts: ['Creating more data', 'Generating actionable insights', 'Making models complex', 'Collecting more features'], ans: 1 },
      { q: 'Transparency in data mining means:', opts: ['Sharing all raw data', 'Stakeholders can understand decisions', 'Using open-source tools', 'Publishing model weights'], ans: 1 }
    ]
  },
  4: {
    title: 'Ethical Issues and Data Privacy',
    ilo: ['Explain ethical issues in data mining.', 'Apply responsible data practices.', 'Recognize bias and privacy concerns.'],
    content: `
      <h3>Data Privacy & Security</h3>
      <p>As data mining grows more powerful, protecting individual privacy becomes critical. Key frameworks: <strong>GDPR</strong> (EU), <strong>Data Privacy Act of 2012</strong> (Philippines), <strong>CCPA</strong> (California).</p>
      <div class="metric-box metric-1">
        <p style="font-weight:bold;">Core Privacy Principles:</p>
        <ul style="margin:0;padding-left:1.5rem;">
          <li><strong>Data Minimization:</strong> Collect only what's needed</li>
          <li><strong>Purpose Limitation:</strong> Use data only for stated purposes</li>
          <li><strong>Consent:</strong> Get explicit permission</li>
          <li><strong>Right to Erasure:</strong> Allow data deletion requests</li>
        </ul>
      </div>

      <h3>Ethical Use of Data</h3>
      <p>Ethical data mining goes beyond legal compliance. It asks: <em>"Just because we can, should we?"</em></p>
      <div style="padding:0.75rem;border-radius:0.375rem;background:rgba(239,68,68,0.08);margin-bottom:0.75rem;">
        <p style="font-weight:bold;font-size:0.875rem;">❌ Unethical Example</p>
        <p style="font-size:0.875rem;">An insurance company uses social media data to deny coverage without informing the applicant.</p>
      </div>
      <div style="padding:0.75rem;border-radius:0.375rem;background:rgba(34,197,94,0.08);">
        <p style="font-weight:bold;font-size:0.875rem;">✅ Ethical Example</p>
        <p style="font-size:0.875rem;">A health app uses anonymized data to identify disease outbreaks, sharing findings with public health agencies.</p>
      </div>

      <h3>Bias in Data Mining</h3>

let kmeansPoints = [];
let kmeansCentroids = [];
let kmeansStep = 0;

function initKMeansDemo() {
  kmeansPoints = [
    {x:30,y:40},{x:45,y:55},{x:35,y:65},{x:50,y:45},{x:25,y:50},
    {x:200,y:140},{x:220,y:155},{x:210,y:130},{x:230,y:145},{x:215,y:160},
    {x:250,y:50},{x:260,y:40},{x:240,y:60},{x:270,y:55},{x:255,y:35}
  ];
  kmeansPoints.forEach(p => p.cluster = -1);
  kmeansCentroids = [{x:50,y:100},{x:150,y:100},{x:250,y:100}];
  kmeansStep = 0;
  drawKMeans();
}

function drawKMeans() {
  const svg = document.getElementById('kmeans-svg');
  if(!svg) return;
  const colors = ['#ef4444','#3b82f6','#22c55e'];
  let html = '';
  kmeansPoints.forEach(p => {
    const fill = p.cluster >= 0 ? colors[p.cluster] : '#94a3b8';
    html += `<circle cx="${p.x}" cy="${p.y}" r="6" fill="${fill}" opacity="0.8"/>`;
  });
  kmeansCentroids.forEach((c,i) => {
    html += `<rect x="${c.x-7}" y="${c.y-7}" width="14" height="14" rx="2" fill="${colors[i]}" stroke="#fff" stroke-width="2" class="anim-pulse"/>`;
  });
  svg.innerHTML = html;
}

function runKMeansDemo() {
  if(kmeansStep >= 6) { resetKMeansDemo(); return; }
  const status = document.getElementById('kmeans-status');

  if(kmeansStep % 2 === 0) {
    kmeansPoints.forEach(p => {
      let minD = Infinity, best = 0;
      kmeansCentroids.forEach((c,i) => {
        const d = Math.sqrt((p.x-c.x)**2 + (p.y-c.y)**2);
        if(d < minD) { minD = d; best = i; }
      });
      p.cluster = best;
    });
    if(status) status.textContent = `Step ${Math.floor(kmeansStep/2)+1}: Assigned points to nearest centroids`;
  } else {
    for(let i=0;i<3;i++) {
      const pts = kmeansPoints.filter(p=>p.cluster===i);
      if(pts.length) {
        kmeansCentroids[i].x = pts.reduce((s,p)=>s+p.x,0)/pts.length;
        kmeansCentroids[i].y = pts.reduce((s,p)=>s+p.y,0)/pts.length;
      }
    }
    if(status) status.textContent = `Step ${Math.floor(kmeansStep/2)+1}: Recalculated centroids`;
  }
  kmeansStep++;
  drawKMeans();
  if(kmeansStep >= 6 && status) status.textContent = 'Converged! Clusters are stable.';
}

function resetKMeansDemo() { initKMeansDemo(); document.getElementById('kmeans-status').textContent = 'Click "Run K-Means" to see the algorithm in action'; }

function calcMetrics() {
  const t=+document.getElementById('mc-total').value;
  const a=+document.getElementById('mc-a').value;
  const b=+document.getElementById('mc-b').value;
  const ab=+document.getElementById('mc-ab').value;
  const r=document.getElementById('mc-results');
  if(!t||t<=0){r.innerHTML='<p style="color:#ef4444;">Enter valid numbers</p>';return;}
  const sup=ab/t, conf=a?ab/a:0, supB=b/t, lift=supB?conf/supB:0;
  r.innerHTML = `
    <p><strong>Support(A∪B):</strong> ${ab}/${t} = <span style="color:var(--c-primary);">${sup.toFixed(3)} (${(sup*100).toFixed(1)}%)</span></p>
    <p><strong>Confidence(A→B):</strong> ${ab}/${a} = <span style="color:#3b82f6;">${conf.toFixed(3)} (${(conf*100).toFixed(1)}%)</span></p>
    <p><strong>Lift(A→B):</strong> ${conf.toFixed(3)}/${supB.toFixed(3)} = <span style="color:#22c55e;">${lift.toFixed(3)}</span></p>
    <p style="margin-top:0.75rem;font-size:0.75rem;opacity:0.7;">${lift>1?'✅ Positive association — items are bought together more than expected!':lift===1?'➡️ Independent — no meaningful association.':'⚠️ Negative association — items are bought together less than expected.'}</p>`;
}

function createQuiz(quizData, weekNum) {
  let html = '';
  quizData.forEach((q, qi) => {
    html += `<div style="margin-bottom:1.5rem;padding:1rem;border-radius:0.5rem;background:rgba(255,255,255,0.03);">
      <p style="font-weight:600;font-size:0.875rem;margin-bottom:0.75rem;">${qi+1}. ${q.q}</p>
      <div style="display:flex;flex-direction:column;gap:0.5rem;">`;
    q.opts.forEach((opt, oi) => {
      html += `<button class="quiz-option" onclick="selectQuizOption(event,${weekNum},${qi},${oi},${q.ans})" style="text-align:left;">${opt}</button>`;
    });
    html += `</div><p id="q${weekNum}-${qi}-fb" style="font-size:0.75rem;margin-top:0.5rem;display:none;"></p></div>`;
  });
  return html;
}

function selectQuizOption(e, w, qi, oi, ans) {
  const btns = e.target.parentElement.querySelectorAll('.quiz-option');
  btns.forEach(b => b.classList.remove('correct', 'wrong'));
  const fb = document.getElementById(`q${w}-${qi}-fb`);
  
  if(oi === ans) {
    e.target.classList.add('correct');
    fb.textContent = '✅ Correct!';
    fb.style.color = '#22c55e';
  } else {
    e.target.classList.add('wrong');
    btns[ans].classList.add('correct');
    fb.textContent = '❌ Incorrect. See the highlighted answer.';
    fb.style.color = '#ef4444';
  }
  fb.style.display = 'block';
}
