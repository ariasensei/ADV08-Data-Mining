// ===== CONFIG & SDK =====
const defaultConfig = {
  course_title: 'ADV08 — Data Mining',
  instructor_name: 'MKDB',
  background_color: '#0f172a',
  surface_color: '#1e293b',
  text_color: '#e2e8f0',
  primary_color: '#6366f1',
  secondary_action_color: '#475569',
  font_family: 'DM Sans',
  font_size: 16
};

function applyConfig(config) {
  document.documentElement.style.setProperty('--c-bg', config.background_color || defaultConfig.background_color);
  document.documentElement.style.setProperty('--c-surface', config.surface_color || defaultConfig.surface_color);
  document.documentElement.style.setProperty('--c-text', config.text_color || defaultConfig.text_color);
  document.documentElement.style.setProperty('--c-primary', config.primary_color || defaultConfig.primary_color);
  document.documentElement.style.setProperty('--c-secondary-action', config.secondary_action_color || defaultConfig.secondary_action_color);

  document.body.style.background = config.background_color || defaultConfig.background_color;
  document.body.style.color = config.text_color || defaultConfig.text_color;
  document.body.style.fontFamily = `${config.font_family || defaultConfig.font_family}, sans-serif`;

  const bs = config.font_size || defaultConfig.font_size;
  document.body.style.fontSize = bs + 'px';

  const t = document.getElementById('el-course-title');
  if(t) t.textContent = config.course_title || defaultConfig.course_title;
  const i = document.getElementById('el-instructor');
  if(i) i.textContent = config.instructor_name || defaultConfig.instructor_name;
}

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => { applyConfig(config); },
  mapToCapabilities: (config) => ({
    recolorables: [
      { get:()=>config.background_color||defaultConfig.background_color, set:(v)=>{config.background_color=v;window.elementSdk.setConfig({background_color:v})} },
      { get:()=>config.surface_color||defaultConfig.surface_color, set:(v)=>{config.surface_color=v;window.elementSdk.setConfig({surface_color:v})} },
      { get:()=>config.text_color||defaultConfig.text_color, set:(v)=>{config.text_color=v;window.elementSdk.setConfig({text_color:v})} },
      { get:()=>config.primary_color||defaultConfig.primary_color, set:(v)=>{config.primary_color=v;window.elementSdk.setConfig({primary_color:v})} },
      { get:()=>config.secondary_action_color||defaultConfig.secondary_action_color, set:(v)=>{config.secondary_action_color=v;window.elementSdk.setConfig({secondary_action_color:v})} }
    ],
    borderables: [],
    fontEditable: { get:()=>config.font_family||defaultConfig.font_family, set:(v)=>{config.font_family=v;window.elementSdk.setConfig({font_family:v})} },
    fontSizeable: { get:()=>config.font_size||defaultConfig.font_size, set:(v)=>{config.font_size=v;window.elementSdk.setConfig({font_size:v})} }
  }),
  mapToEditPanelValues: (config) => new Map([
    ['course_title', config.course_title || defaultConfig.course_title],
    ['instructor_name', config.instructor_name || defaultConfig.instructor_name]
  ])
});

// ===== WEEK DATA =====
const weeks = {
  1: {
    title: 'Clustering Techniques',
    ilo: ['Apply K-Means clustering to datasets.','Interpret clustering results.'],
    sections: [
      {
        heading: 'What is Clustering?',
        content: `<p class="mb-3">Clustering is an <strong>unsupervised learning</strong> technique that groups similar data points together without predefined labels. Think of it as sorting a pile of mixed candies by color — you don't need someone to tell you the categories; you discover them naturally.</p>
        <p class="mb-3">Clustering helps us find hidden structure in data. It's used in customer segmentation, image compression, anomaly detection, and much more.</p>`,
        illustration: 'clustering-intro'
      },
      {
        heading: 'K-Means Clustering',
        content: `<p class="mb-3"><strong>K-Means</strong> is the most popular clustering algorithm. It partitions data into <em>K</em> clusters by repeatedly assigning points to the nearest center (centroid) and updating centroids.</p>
        <div class="p-4 rounded-lg mb-4" style="background:rgba(99,102,241,0.1);border-left:4px solid var(--c-primary);">
          <p class="font-bold mb-2">Algorithm Steps:</p>
          <ol class="list-decimal pl-5 space-y-1 text-sm">
            <li>Choose K (number of clusters)</li>
            <li>Randomly initialize K centroids</li>
            <li>Assign each point to nearest centroid</li>
            <li>Recalculate centroids as mean of assigned points</li>
            <li>Repeat steps 3–4 until centroids stabilize</li>
          </ol>
        </div>`,
        illustration: 'kmeans-interactive'
      },
      {
        heading: 'Real-World Scenario: Customer Segmentation',
        content: `<p class="mb-3">🏬 <strong>Scenario:</strong> A retail company wants to segment its customers based on annual spending and frequency of purchases to create targeted marketing campaigns.</p>
        <p class="mb-3">Using K-Means with K=3, they discover three segments:</p>
        <ul class="list-disc pl-5 space-y-1 mb-3 text-sm">
          <li><strong style="color:#ef4444;">High-Value:</strong> Frequent buyers, high spending → VIP rewards</li>
          <li><strong style="color:#3b82f6;">Regular:</strong> Moderate frequency & spending → Loyalty programs</li>
          <li><strong style="color:#22c55e;">Occasional:</strong> Rare visits, low spending → Re-engagement offers</li>
        </ul>`,
        illustration: 'customer-segments'
      },
      {
        heading: 'Hierarchical Clustering (Overview)',
        content: `<p class="mb-3">Unlike K-Means, <strong>hierarchical clustering</strong> builds a tree-like structure (dendrogram) showing how clusters merge or split at different levels. You don't need to specify K in advance.</p>
        <p class="mb-3"><strong>Two approaches:</strong></p>
        <ul class="list-disc pl-5 space-y-1 mb-3 text-sm">
          <li><strong>Agglomerative (bottom-up):</strong> Start with individual points, merge closest pairs</li>
          <li><strong>Divisive (top-down):</strong> Start with one cluster, split recursively</li>
        </ul>
        <p class="text-sm opacity-70">Hierarchical clustering is useful when you want to explore different levels of grouping — e.g., classifying biological species or organizing documents.</p>`,
        illustration: 'dendrogram'
      }
    ],
    activities: {
      individual: {
        title: '📝 Individual Activity: Cluster the Students',
        description: `<p class="mb-2">Given the following dataset of student study hours (x) and exam scores (y), manually perform K-Means clustering with K=2 for one iteration:</p>
        <table class="w-full text-sm mb-3 border-collapse">
          <thead><tr style="background:rgba(99,102,241,0.15);"><th class="p-2 text-left rounded-tl-lg">Student</th><th class="p-2 text-left">Hours</th><th class="p-2 text-left rounded-tr-lg">Score</th></tr></thead>
          <tbody>
            <tr style="border-bottom:1px solid rgba(255,255,255,0.05);"><td class="p-2">A</td><td class="p-2">2</td><td class="p-2">55</td></tr>
            <tr style="border-bottom:1px solid rgba(255,255,255,0.05);"><td class="p-2">B</td><td class="p-2">3</td><td class="p-2">60</td></tr>
            <tr style="border-bottom:1px solid rgba(255,255,255,0.05);"><td class="p-2">C</td><td class="p-2">8</td><td class="p-2">90</td></tr>
            <tr style="border-bottom:1px solid rgba(255,255,255,0.05);"><td class="p-2">D</td><td class="p-2">9</td><td class="p-2">85</td></tr>
            <tr><td class="p-2">E</td><td class="p-2">5</td><td class="p-2">72</td></tr>
          </tbody>
        </table>
        <p class="text-sm"><strong>Task:</strong> Using initial centroids at Student A (2,55) and Student C (8,90), assign each student to the nearest cluster and calculate new centroids. Show your work.</p>`
      },
      group: {
        title: '👥 Group Activity: Segment Real Customers',
        description: `<p class="mb-2">In groups of 3–4, choose one of these real-world datasets:</p>
        <ol class="list-decimal pl-5 space-y-1 mb-3 text-sm">
          <li>Mall customer spending data (age, income, spending score)</li>
          <li>University students (GPA, study hours, extracurricular activities)</li>
          <li>Social media users (posts/day, followers, engagement rate)</li>
        </ol>
        <p class="text-sm mb-2"><strong>Deliverables:</strong></p>
        <ul class="list-disc pl-5 space-y-1 text-sm">
          <li>Create a mock dataset of at least 15 entries</li>
          <li>Apply K-Means with K=2 and K=3, compare results</li>
          <li>Create a visual scatter plot (hand-drawn or digital)</li>
          <li>Present 3-minute summary: What patterns did you find?</li>
        </ul>`
      }
    },
    quiz: [
      { q:'What type of learning is clustering?', opts:['Supervised','Unsupervised','Reinforcement','Semi-supervised'], ans:1 },
      { q:'In K-Means, what does K represent?', opts:['Number of features','Number of iterations','Number of clusters','Number of data points'], ans:2 },
      { q:'After assigning points to clusters, the next step is:', opts:['Stop the algorithm','Recalculate centroids','Add more data','Remove outliers'], ans:1 },
      { q:'Which clustering method creates a dendrogram?', opts:['K-Means','DBSCAN','Hierarchical','Random Forest'], ans:2 }
    ]
  },
  2: {
    title: 'Association Rule Mining',
    ilo: ['Explain association rule mining concepts.','Interpret support, confidence, and lift measures.','Apply association rule mining to datasets.'],
    sections: [
      {
        heading: 'What is Association Rule Mining?',
        content: `<p class="mb-3">Association rule mining discovers interesting <strong>relationships between variables</strong> in large datasets. The classic example: "Customers who buy bread often also buy butter."</p>
        <p class="mb-3">This technique is fundamental in <strong>market basket analysis</strong> — understanding what items are frequently purchased together to optimize store layouts, promotions, and recommendations.</p>`,
        illustration: 'basket'
      },
      {
        heading: 'Key Measures: Support, Confidence, Lift',
        content: `<div class="space-y-4">
          <div class="p-4 rounded-lg" style="background:rgba(99,102,241,0.1);border-left:4px solid #6366f1;">
            <p class="font-bold">📊 Support</p>
            <p class="text-sm mt-1">How frequently an itemset appears in the dataset.</p>
            <p class="text-sm mt-1 font-mono" style="color:var(--c-primary);">Support(A) = (Transactions containing A) / (Total transactions)</p>
          </div>
          <div class="p-4 rounded-lg" style="background:rgba(59,130,246,0.1);border-left:4px solid #3b82f6;">
            <p class="font-bold">🎯 Confidence</p>
            <p class="text-sm mt-1">How often the rule is true — if A is bought, what's the probability B is also bought?</p>
            <p class="text-sm mt-1 font-mono" style="color:#3b82f6;">Confidence(A→B) = Support(A∪B) / Support(A)</p>
          </div>
          <div class="p-4 rounded-lg" style="background:rgba(34,197,94,0.1);border-left:4px solid #22c55e;">
            <p class="font-bold">🚀 Lift</p>
            <p class="text-sm mt-1">How much more likely A and B are bought together vs. independently.</p>
            <p class="text-sm mt-1 font-mono" style="color:#22c55e;">Lift(A→B) = Confidence(A→B) / Support(B)</p>
            <p class="text-sm mt-1 opacity-70">Lift > 1 = positive association, Lift = 1 = independent, Lift < 1 = negative</p>
          </div>
        </div>`,
        illustration: 'metrics-calc'
      },
      {
        heading: 'Real-World Scenario: Grocery Store Analysis',
        content: `<p class="mb-3">🛒 <strong>Scenario:</strong> A supermarket analyzed 1,000 transactions and found:</p>
        <ul class="list-disc pl-5 space-y-1 mb-3 text-sm">
          <li>400 transactions contain Bread</li>
          <li>300 transactions contain Butter</li>
          <li>200 transactions contain both Bread and Butter</li>
        </ul>
        <p class="mb-1 text-sm"><strong>Support(Bread→Butter)</strong> = 200/1000 = <strong>0.20 (20%)</strong></p>
        <p class="mb-1 text-sm"><strong>Confidence(Bread→Butter)</strong> = 200/400 = <strong>0.50 (50%)</strong></p>
        <p class="mb-3 text-sm"><strong>Lift(Bread→Butter)</strong> = 0.50/0.30 = <strong>1.67</strong> → Positive association!</p>
        <p class="text-sm opacity-80">💡 <em>Action:</em> Place bread and butter near each other; bundle discount on both items.</p>`,
        illustration: 'grocery-viz'
      },
      {
        heading: 'Apriori Algorithm (Conceptual)',
        content: `<p class="mb-3">The <strong>Apriori algorithm</strong> efficiently finds frequent itemsets by using the principle: <em>"If an itemset is infrequent, all its supersets must also be infrequent."</em></p>
        <div class="p-4 rounded-lg mb-3" style="background:rgba(99,102,241,0.1);border-left:4px solid var(--c-primary);">
          <p class="font-bold mb-2">How Apriori Works:</p>
          <ol class="list-decimal pl-5 space-y-1 text-sm">
            <li>Set a minimum support threshold</li>
            <li>Find all single items meeting the threshold</li>
            <li>Generate candidate pairs from frequent items</li>
            <li>Prune pairs below the threshold</li>
            <li>Continue combining into larger sets until no more frequent sets</li>
          </ol>
        </div>
        <p class="text-sm opacity-70">This "level-wise" approach dramatically reduces computation compared to checking every possible combination.</p>`,
        illustration: 'apriori-flow'
      }
    ],
    activities: {

        description: `<p class="mb-2">In groups of 3–4, pick a store type (fast food, electronics, clothing) and:</p>

    quiz: [

      { q:'If Lift = 1.0, the items are:', opts:['Positively associated','Negatively associated','Independent','Always bought together'], ans:2 },
      { q:'Confidence(A→B) measures:', opts:['How often A appears','How often B appears given A','Total transactions','Number of items'], ans:1 },

    ]
  },
  3: {
    title: 'Data Mining for Business Decision Making',

    sections: [
      {
        heading: 'From Patterns to Decisions',

        illustration: 'pipeline'
      },
      {
        heading: 'Interpreting Patterns & Models',
        content: `<p class="mb-3">Key questions when interpreting results:</p>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
          <div class="p-3 rounded-lg" style="background:rgba(99,102,241,0.08);">
            <p class="font-bold text-sm">🔍 Validity</p>
            <p class="text-xs mt-1">Is the pattern statistically significant or just noise?</p>
          </div>
          <div class="p-3 rounded-lg" style="background:rgba(59,130,246,0.08);">
            <p class="font-bold text-sm">📏 Magnitude</p>
            <p class="text-xs mt-1">How large is the effect? Is it practically important?</p>
          </div>
          <div class="p-3 rounded-lg" style="background:rgba(34,197,94,0.08);">
            <p class="font-bold text-sm">🎯 Actionability</p>
            <p class="text-xs mt-1">Can we do something about it? What's the next step?</p>

          </div>

        illustration: 'interpret'

      {
        heading: 'Real-World Scenario: Reducing Churn',
        content: `<p class="mb-3">📱 <strong>Scenario:</strong> A telecom company uses a classification model to predict customer churn. The model reveals:</p>
        <ul class="list-disc pl-5 space-y-1 mb-3 text-sm">
          <li>Customers with contract month-to-month are 3x more likely to churn</li>
          <li>Customers who called support > 4 times have 72% churn rate</li>
          <li>High data users with slow plans churn within 3 months</li>

        <p class="mb-2 text-sm font-bold">Business Actions:</p>

      {
        heading: 'Ethical Issues & Data Privacy',
        content: `<p class="mb-3">Data-driven decisions must consider ethical implications:</p>
        <div class="space-y-2 mb-3">

// ===== K-MEANS DEMO =====
let kmeansPoints = [];
let kmeansCentroids = [];
let kmeansStep = 0;

function initKMeansDemo() {
  kmeansPoints = [
    {x:30,y:40},{x:45,y:55},{x:35,y:65},{x:50,y:45},{x:25,y:50},
    {x:200,y:140},{x:220,y:155},{x:210,y:130},{x:230,y:145},{x:215,y:160},
    {x:250,y:50},{x:260,y:40},{x:240,y:60},{x:270,y:55},{x:255,y:35}
  ];
  kmeansPoints.forEach(p => p.cluster = -1);
  kmeansCentroids = [{x:50,y:100,c:'#ef4444'},{x:150,y:100,c:'#3b82f6'},{x:250,y:100,c:'#22c55e'}];
  kmeansStep = 0;
  drawKMeans();
}

function drawKMeans() {
  const svg = document.getElementById('kmeans-svg');
  if(!svg) return;
  const colors = ['#ef4444','#3b82f6','#22c55e'];
  let html = '';
  kmeansPoints.forEach(p => {
    const fill = p.cluster >= 0 ? colors[p.cluster] : '#94a3b8';
    html += `<circle class="cluster-dot" cx="${p.x}" cy="${p.y}" r="6" fill="${fill}" opacity="0.8"/>`;
  });
  kmeansCentroids.forEach((c,i) => {
    html += `<rect x="${c.x-7}" y="${c.y-7}" width="14" height="14" rx="2" fill="${colors[i]}" stroke="#fff" stroke-width="2" class="anim-pulse-dot"/>`;
  });
  svg.innerHTML = html;
}

function runKMeansDemo() {
  if(kmeansStep >= 6) { resetKMeansDemo(); return; }
  const status = document.getElementById('kmeans-status');

  if(kmeansStep % 2 === 0) {
    // Assign
    kmeansPoints.forEach(p => {
      let minD = Infinity, best = 0;
      kmeansCentroids.forEach((c,i) => {
        const d = Math.sqrt((p.x-c.x)**2 + (p.y-c.y)**2);
        if(d < minD) { minD = d; best = i; }
      });
      p.cluster = best;
    });
    if(status) status.textContent = `Step ${Math.floor(kmeansStep/2)+1}: Assigned points to nearest centroids`;
  } else {
    // Update
    for(let i=0;i<3;i++) {
      const pts = kmeansPoints.filter(p=>p.cluster===i);
      if(pts.length) {
        kmeansCentroids[i].x = pts.reduce((s,p)=>s+p.x,0)/pts.length;
        kmeansCentroids[i].y = pts.reduce((s,p)=>s+p.y,0)/pts.length;
      }
    }
    if(status) status.textContent = `Step ${Math.floor(kmeansStep/2)+1}: Recalculated centroids`;
  }
  kmeansStep++;
  drawKMeans();
  if(kmeansStep >= 6 && status) status.textContent = 'Converged! Clusters are stable. Click Reset to try again.';
}

function resetKMeansDemo() { initKMeansDemo(); document.getElementById('kmeans-status').textContent = 'Click "Run K-Means" to see the algorithm in action'; }

// ===== METRICS CALCULATOR =====
function calcMetrics() {
  const t=+document.getElementById('mc-total').value;
  const a=+document.getElementById('mc-a').value;
  const b=+document.getElementById('mc-b').value;
  const ab=+document.getElementById('mc-ab').value;
  const r=document.getElementById('mc-results');
  if(!t||t<=0){r.innerHTML='<p class="text-red-400">Enter valid numbers</p>';return;}
  const sup=ab/t, conf=a?ab/a:0, supB=b/t, lift=supB?conf/supB:0;
  r.innerHTML = `
    <p><strong>Support(A∪B):</strong> ${ab}/${t} = <span style="color:var(--c-primary);">${sup.toFixed(3)} (${(sup*100).toFixed(1)}%)</span></p>
    <p><strong>Confidence(A→B):</strong> ${ab}/${a} = <span style="color:#3b82f6;">${conf.toFixed(3)} (${(conf*100).toFixed(1)}%)</span></p>
    <p><strong>Lift(A→B):</strong> ${conf.toFixed(3)}/${supB.toFixed(3)} = <span style="color:#22c55e;">${lift.toFixed(3)}</span></p>
    <p class="mt-2 text-xs opacity-70">${lift>1?'✅ Positive association — items are bought together more than expected!':lift===1?'➡️ Independent — no meaningful association.':'⚠️ Negative association — items are bought together less than expected.'}</p>`;
}

// ===== QUIZ SYSTEM =====
function createQuiz(quizData, weekNum) {
  let html = '<div class="space-y-4">';
  quizData.forEach((q, qi) => {
    html += `<div class="p-4 rounded-lg" style="background:rgba(255,255,255,0.03);">
      <p class="font-semibold text-sm mb-2">${qi+1}. ${q.q}</p>
      <div class="space-y-2">`;
    q.opts.forEach((opt, oi) => {
      html += `<div class="quiz-option p-2 rounded-lg text-sm" id="q${weekNum}-${qi}-${oi}" onclick="selectQuizOption(${weekNum},${qi},${oi},${q.ans})">${opt}</div>`;
    });
    html += `</div><p id="q${weekNum}-${qi}-fb" class="text-xs mt-2 hidden"></p></div>`;
  });
  html += `</div>`;
  return html;
}

function selectQuizOption(w, qi, oi, ans) {
  // Clear previous selections for this question
  for(let i=0;i<4;i++) {
    const el = document.getElementById(`q${w}-${qi}-${i}`);
    if(el) { el.classList.remove('selected','correct','wrong'); }
  }
  const sel = document.getElementById(`q${w}-${qi}-${oi}`);
  const fb = document.getElementById(`q${w}-${qi}-fb`);
  if(oi === ans) {
    sel.classList.add('correct');
    fb.textContent = '✅ Correct!';
    fb.style.color = '#22c55e';
  } else {
    sel.classList.add('wrong');
    document.getElementById(`q${w}-${qi}-${ans}`).classList.add('correct');
    fb.textContent = '❌ Incorrect. The correct answer is highlighted.';
    fb.style.color = '#ef4444';
  }
  fb.classList.remove('hidden');
}

      ${w.ilo.map(i=>`<p class="text-sm flex items-start gap-2"><span style="color:var(--c-primary);">✦</span>${i}</p>`).join('')}
    </div>
  </div>`;

  // Section tabs
  const sectionIds = w.sections.map((_,i)=>`s${n}-${i}`);
  html += `<div class="flex gap-2 mb-4 overflow-x-auto pb-2">
    <button onclick="showSection(${n},'lesson')" id="stab-${n}-lesson" class="px-3 py-1.5 rounded text-xs font-semibold whitespace-nowrap" style="background:var(--c-primary);color:#fff;">📖 Lesson</button>
    <button onclick="showSection(${n},'quiz')" id="stab-${n}-quiz" class="px-3 py-1.5 rounded text-xs font-semibold whitespace-nowrap" style="background:var(--c-surface);">🧠 Quiz</button>
    <button onclick="showSection(${n},'individual')" id="stab-${n}-individual" class="px-3 py-1.5 rounded text-xs font-semibold whitespace-nowrap" style="background:var(--c-surface);">📝 Individual</button>
    <button onclick="showSection(${n},'group')" id="stab-${n}-group" class="px-3 py-1.5 rounded text-xs font-semibold whitespace-nowrap" style="background:var(--c-surface);">👥 Group</button>
  </div>`;

  // Lesson content
  html += `<div id="sec-${n}-lesson">`;
  w.sections.forEach((s,i) => {
    html += `<div class="mb-6 p-5 rounded-xl card-hover" style="background:var(--c-surface);">
      <h3 class="text-lg font-bold mb-3" style="font-family:'Space Mono',monospace;">${s.heading}</h3>
      <div class="text-sm leading-relaxed">${s.content}</div>
      <div id="illust-${n}-${i}"></div>
    </div>`;
  });
  html += `</div>`;

  // Quiz
  html += `<div id="sec-${n}-quiz" class="hidden">
    <div class="p-5 rounded-xl" style="background:var(--c-surface);">
      <h3 class="text-lg font-bold mb-4" style="font-family:'Space Mono',monospace;">🧠 Knowledge Check — Week ${n}</h3>
      ${createQuiz(w.quiz, n)}
    </div>
  </div>`;

  // Individual activity
  html += `<div id="sec-${n}-individual" class="hidden">
    <div class="p-5 rounded-xl" style="background:var(--c-surface);">
      <h3 class="text-lg font-bold mb-3" style="font-family:'Space Mono',monospace;">${w.activities.individual.title}</h3>
      <div class="text-sm leading-relaxed">${w.activities.individual.description}</div>
    </div>
  </div>`;

  // Group activity
  html += `<div id="sec-${n}-group" class="hidden">
    <div class="p-5 rounded-xl" style="background:var(--c-surface);">
      <h3 class="text-lg font-bold mb-3" style="font-family:'Space Mono',monospace;">${w.activities.group.title}</h3>
      <div class="text-sm leading-relaxed">${w.activities.group.description}</div>
    </div>
  </div>`;

  html += `</div>`;
  area.innerHTML = html;

  // Render illustrations
  w.sections.forEach((s,i) => {
    const container = document.getElementById(`illust-${n}-${i}`);
    if(container && s.illustration) renderIllustration(s.illustration, container);
  });

  lucide.createIcons();
}

function showSection(week, section) {
  ['lesson','quiz','individual','group'].forEach(s => {
    const el = document.getElementById(`sec-${week}-${s}`);
    const tab = document.getElementById(`stab-${week}-${s}`);
    if(el) el.classList.toggle('hidden', s !== section);
    if(tab) {
      tab.style.background = s === section ? 'var(--c-primary)' : 'var(--c-surface)';
      tab.style.color = s === section ? '#fff' : 'var(--c-text)';
    }
  });
}

// Init
applyConfig(defaultConfig);
renderWeek(1);
lucide.createIcons();
</script>
